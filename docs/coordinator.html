<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coordinator Dashboard</title>
  <link rel="stylesheet" href="coordinator.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <button id="mail" class="mail">Open Mail</button>
      <h1>Coordinator Dashboard</h1>
      <div id="overlay" class="hidden"></div>

      <div id="popup" class="popup hidden">
        <h2>Send Email</h2>
        <form>

          <h3>Sends Mail to All Late Applicants</h3>

          <label for="subject">Subject:</label>
          <input type="text" id="subject" placeholder="Enter Subject"/>

          <label for="message">To:</label>
          <textarea id="message" placeholder="Write Message"></textarea>

          <div class="buttons">
            <button type="submit" id="sendBtn">Send</button>
            <button type="button" id="closeBtn">Close</button>
          </div>

        </form>
      </div>
      <button id="logoutBtn">Logout</button>
    </div>

    <div class="view-switch">
      <button id="showAllBtn" class="active">All Applicants</button>
      <button id="showLateBtn">Late Applicants</button>
    </div>

    <div id="message" class="message"></div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Student ID</th>
          <th>Email</th>
          <th>Provisional Status</th>
          <th>Final Status</th>
          <th>Report Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="applicantTableBody"></tbody>
    </table>
  </div>

  <script src="config.js"></script>
  <script src="logout.js"></script>
  <script src="coordinator.js"></script>
</body>
</html>
